# Render Blueprint — deploy QSL ERP as an always-on development demo.
# Docs: https://render.com/docs/blueprint-spec
#
# How it works: builds the existing Node-20 Dockerfile, then (overriding the
# Dockerfile CMD) bootstraps the file database from the committed seed template
# on first boot and starts Next.js. The seed template carries all demo data,
# settings and module flags, so the demo is fully populated immediately.
#
# PERSISTENCE: the free plan has no persistent disk, so /var/data is ephemeral
# — user-entered data resets to the seed template whenever the instance
# restarts (free instances sleep after ~15 min idle). To KEEP data across
# restarts, change `plan: free` to `plan: starter` and uncomment the `disk:`
# block at the bottom (a Render disk requires a paid instance type).

services:
  - type: web
    name: qsl-erp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Just start the server. The DB bootstrap (copy seed-template.db to
    # SQLITE_PATH on first boot, creating the dir) is handled in src/lib/db.js,
    # and upload dirs are created on demand — so no shell step is needed here.
    dockerCommand: npm start
    healthCheckPath: /api/branding
    envVars:
      - key: NODE_ENV
        value: production
      # Writable, owned by the non-root container user. Ephemeral on the free
      # plan (resets on restart). For persistence, see the disk note below.
      - key: SQLITE_PATH
        value: /app/data/qsl_erp.db
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret automatically

    # ── Persistence (recommended for shared user testing) ──────────────────
    # Render disks require a paid instance type. To keep data across restarts:
    #   1. change `plan: free` above to `plan: starter`
    #   2. set SQLITE_PATH=/var/data/qsl_erp.db and UPLOAD_DIR=/var/data/uploads
    #   3. uncomment the block below (the mounted disk is writable by the service user)
    # disk:
    #   name: qsl-data
    #   mountPath: /var/data
    #   sizeGB: 1

  # ── Scheduler (cron jobs) — NOT enabled by default ──────────────────────
  # src/lib/scheduler.js registers daily/weekly cron jobs (overdue imprest,
  # compliance alerts, DB backup, fleet alerts, debtor reminders, etc.) but
  # they only run inside a long-lived `node src/lib/scheduler.js` process
  # (`npm run scheduler:start`) — the `web` service above does NOT run them,
  # since Next.js's request/response model has no background process of its
  # own. Without this service (or an external cron hitting the individual
  # `npm run jobs:*` scripts on a schedule), none of those jobs ever fire.
  # Uncomment to run it as a Render Background Worker (paid plans only —
  # background workers aren't available on the free tier):
  # - type: worker
  #   name: qsl-erp-scheduler
  #   runtime: docker
  #   plan: starter
  #   dockerfilePath: ./Dockerfile
  #   dockerContext: .
  #   dockerCommand: npm run scheduler:start
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: SQLITE_PATH
  #       value: /var/data/qsl_erp.db   # must match the web service's path/disk
  #     - key: UPLOAD_DIR
  #       value: /var/data/uploads
