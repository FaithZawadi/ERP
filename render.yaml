# Render Blueprint — deploy QSL ERP as an always-on development demo.
# Docs: https://render.com/docs/blueprint-spec
#
# How it works: builds the existing Node-20 Dockerfile, then (overriding the
# Dockerfile CMD) bootstraps the file database from the committed seed template
# on first boot and starts Next.js. The seed template carries all demo data,
# settings and module flags, so the demo is fully populated immediately.
#
# PERSISTENCE: the free plan has no persistent disk, so /var/data is ephemeral
# — user-entered data resets to the seed template whenever the instance
# restarts (free instances sleep after ~15 min idle). To KEEP data across
# restarts, change `plan: free` to `plan: starter` and uncomment the `disk:`
# block at the bottom (a Render disk requires a paid instance type).

services:
  - type: web
    name: qsl-erp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Just start the server. The DB bootstrap (copy seed-template.db to
    # SQLITE_PATH on first boot, creating the dir) is handled in src/lib/db.js,
    # and upload dirs are created on demand — so no shell step is needed here.
    dockerCommand: npm start
    healthCheckPath: /api/branding
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/qsl_erp.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret automatically

    # ── Persistence (recommended for shared user testing) ──────────────────
    # Render disks require a paid instance type. To keep data across restarts:
    #   1. change `plan: free` above to `plan: starter`
    #   2. uncomment the block below
    # disk:
    #   name: qsl-data
    #   mountPath: /var/data
    #   sizeGB: 1
